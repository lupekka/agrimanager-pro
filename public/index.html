<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#064e3b" />
    <title>AgriManage Pro | Smart Farming</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:ital,wght@0,800;1,800&display=swap" rel="stylesheet">

    <style>
      /* 3. STILI GLOBALI CHE REACT NON PUÒ GESTIRE */
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #f8f9fa;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Titoli in "Black Italic" come richiesto */
      h1, h2, h3, h4 {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
      }

      /* Scrollbar personalizzata "stile Apple" */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1fae5;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #059669;
      }

      /* Rende i tasti più reattivi al tocco sul telefono */
      button, a {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <noscript>Devi abilitare JavaScript per far funzionare AgriManage Pro.</noscript>
    <div id="root"></div>
  </body>
</html>
