<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#059669" />
    <title>AgriManage Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            borderRadius: {
              '2xl': '1rem',
              '3xl': '1.5rem',
            }
          }
        }
      }
    </script>
    
    <style type="text/tailwindcss">
      @layer components {
        .ui-input {
          @apply border border-stone-200 bg-stone-50 rounded-xl p-3 text-base outline-none transition-all duration-150 focus:border-emerald-300 focus:bg-white focus:ring-2 focus:ring-emerald-100 placeholder:text-stone-400;
        }
        .ui-button-primary {
          @apply bg-emerald-600 text-white px-6 py-3 rounded-xl font-semibold shadow-md shadow-emerald-200 transition-all duration-150 hover:bg-emerald-700 hover:shadow-lg active:scale-[0.98] whitespace-nowrap;
        }
        .ui-button-secondary {
          @apply bg-stone-100 text-stone-700 px-6 py-3 rounded-xl font-medium transition-all duration-150 hover:bg-stone-200 hover:text-stone-900 active:scale-[0.98] whitespace-nowrap;
        }
        /* Nasconde la scrollbar del menu mobile */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      }
    </style>
  </head>
  <body>
    <noscript>Devi abilitare JavaScript per correre questa app.</noscript>
    <div id="root"></div>
  </body>
</html>
