<!-- ONESIGNAL - VERSIONE DEFINITIVA CON NOME RINOMINATO -->
<script>
  (function() {
    var script = document.createElement('script');
    // ⚠️ NOTA IL NUOVO NOME DEL FILE ⚠️
    script.src = 'https://onesignal-proxy.lucapezza1.workers.dev/TwoSignalSDK.page.js';
    script.async = false;
    script.onload = function() {
      console.log('✅ OneSignal caricato via proxy (nome rinominato)');
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      window.OneSignalDeferred.push(function(OneSignal) {
        OneSignal.init({
          appId: "feed9c1e-90cc-468f-a2b5-2dad2c0350ac",
          safari_web_id: "web.onesignal.auto.3cd6b41f-0715-4da8-9807-02ca4af2dc44",
          notifyButton: { enable: true },
          // ⚠️ QUESTA RIGA È FONDAMENTALE ⚠️
          // Dice a OneSignal di usare il nostro service worker con il nuovo nome
          serviceWorkerPath: "TwoSignalSDKWorker.js"
        });
      });
    };
    document.head.appendChild(script);
  })();
</script>
    
    <!-- FONT OTTIMIZZATI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    
    <!-- TAILWIND CON CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- CONFIGURAZIONE TAILWIND PERSONALIZZATA -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              emerald: {
                50: '#ecfdf5',
                100: '#d1fae5',
                200: '#a7f3d0',
                300: '#6ee7b7',
                400: '#34d399',
                500: '#10b981',
                600: '#059669',
                700: '#047857',
                800: '#065f46',
                900: '#064e3b',
                950: '#022c22',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Plus Jakarta Sans', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.3s ease-out',
              'bounce-slow': 'bounce 2s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    
    <!-- STILI PERSONALIZZATI PER SAFE AREA -->
    <style>
      /* Reset margin/padding per body */
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: #F8F9FA;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Utility per safe area */
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pl-safe {
        padding-left: env(safe-area-inset-left);
      }
      .pr-safe {
        padding-right: env(safe-area-inset-right);
      }
      
      /* Safe area combinate */
      .safe-inset {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      
      /* Scrollbar personalizzata */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #059669;
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #047857;
      }
      
      /* Nascondi scrollbar mobile */
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      
      /* Animazioni */
      .animate-in {
        animation: fadeIn 0.3s ease-out;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      /* Utilità per text balancing */
      .text-balance {
        text-wrap: balance;
      }
      
      /* Miglioramenti tap target per mobile */
      @media (max-width: 768px) {
        button, 
        [role="button"],
        a {
          min-height: 44px;
          min-width: 44px;
        }
      }
      
      /* Prevenire selezione testo su UI elements */
      .no-select {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  
  <body class="bg-[#F8F9FA] antialiased no-select">
